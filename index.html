<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FARAON BOTS - SaaS Platform</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#05070a;
color:#fff;
display:flex;
min-height:100vh;
}

/* SIDEBAR */
.sidebar{
width:260px;
background:#0b0f14;
border-left:1px solid #1aff1a22;
padding:20px;
}

.logo{
color:#1aff1a;
font-size:20px;
font-weight:bold;
margin-bottom:25px;
}

.menu button{
width:100%;
margin-top:10px;
padding:10px;
background:#111;
border:1px solid #1aff1a33;
color:#fff;
cursor:pointer;
border-radius:8px;
transition:.3s;
}

.menu button:hover{
background:#1aff1a22;
}

/* MAIN */
.main{
flex:1;
padding:20px;
}

/* TOP BAR */
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.title{
font-size:22px;
color:#1aff1a;
}

/* CARDS */
.cards{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
margin-bottom:20px;
}

.card{
background:#0b0f14;
padding:15px;
border-radius:12px;
border:1px solid #1aff1a22;
}

.card h3{
color:#1aff1a;
}

/* BOT LIST */
.bot{
background:#0b0f14;
padding:15px;
margin-top:10px;
border-radius:10px;
border:1px solid #1aff1a22;
display:flex;
justify-content:space-between;
align-items:center;
}

/* BUTTON */
.btn{
padding:8px 12px;
border:none;
border-radius:8px;
cursor:pointer;
}

.green{
background:#1aff1a;
color:#000;
font-weight:bold;
}

.dark{
background:#111;
color:#fff;
border:1px solid #333;
}

/* FORM */
input{
width:100%;
padding:10px;
margin-top:10px;
background:#111;
border:1px solid #1aff1a33;
color:#fff;
border-radius:8px;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

<div class="logo">FARAON BOTS</div>

<div class="menu">
<button onclick="show('dashboard')">📊 Dashboard</button>
<button onclick="show('create')">➕ Create Bot</button>
<button onclick="show('bots')">🤖 My Bots</button>
</div>

</div>

<!-- MAIN -->
<div class="main">

<!-- DASHBOARD -->
<div id="dashboard">

<div class="topbar">
<div class="title">Dashboard</div>
</div>

<div class="cards">

<div class="card">
<h3>15,000+</h3>
<p>Bots Created</p>
</div>

<div class="card">
<h3>99.9%</h3>
<p>Uptime</p>
</div>

<div class="card">
<h3>24/7</h3>
<p>Support</p>
</div>

</div>

</div>

<!-- CREATE BOT -->
<div id="create" style="display:none">

<h2 style="color:#1aff1a">Create New Bot</h2>

<input id="name" placeholder="Bot Name">
<input id="token" placeholder="Bot Token">
<input id="chat" placeholder="Chat ID">

<button class="btn green" onclick="createBot()">Generate Bot</button>

<pre id="out" style="margin-top:15px;color:#1aff1a"></pre>

</div>

<!-- BOTS -->
<div id="bots" style="display:none">

<h2 style="color:#1aff1a">My Bots</h2>

<div id="list"></div>

</div>

</div>

<script>

let bots = [];

function show(id){

document.querySelectorAll('.main > div')
.forEach(e=>e.style.display='none');

document.getElementById(id).style.display='block';
}

function createBot(){

let name = document.getElementById('name').value;
let token = document.getElementById('token').value;
let chat = document.getElementById('chat').value;

if(!name||!token||!chat){
alert("Fill all fields");
return;
}

let bot = {
name,token,chat
};

bots.push(bot);

document.getElementById('out').innerText =
"Bot Created: " + name;

renderBots();
}

function renderBots(){

let list = document.getElementById('list');
list.innerHTML = "";

bots.forEach((b,i)=>{

list.innerHTML += `
<div class="bot">
<div>
<b>${b.name}</b><br>
<small>${b.token.slice(0,10)}...</small>
</div>
<button class="btn dark" onclick="alert('Bot Running')">
Run
</button>
</div>
`;

});

}

</script>

</body>
</html>
