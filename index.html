<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>newnumbervip</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
--bg:#070b18;
--card:#111a2e;
--primary:#7c6cff;
--glow:#00f2ff;
--text:#fff;
--muted:#9aa4b2;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo';}

body{
background:var(--bg);
color:var(--text);
overflow-x:hidden;
}

/* ===== HERO ===== */
.hero{
text-align:center;
padding:30px 20px;
position:relative;
}

.bg-blur{
position:absolute;
top:0;left:0;
width:100%;
height:220px;
background:url('https://i.postimg.cc/vZps3xpJ/file-000000002878720ab1fd8c8b5f702d6c.png') center/cover;
filter:blur(20px);
opacity:0.3;
z-index:-1;
}

.avatar{
width:120px;
height:120px;
border-radius:50%;
margin:auto;
border:3px solid var(--glow);
box-shadow:0 0 25px var(--glow);
animation:spinGlow 3s linear infinite;
}

@keyframes spinGlow{
0%{box-shadow:0 0 10px var(--glow);}
50%{box-shadow:0 0 30px #7c6cff;}
100%{box-shadow:0 0 10px var(--glow);}
}

.title{
font-size:28px;
font-weight:800;
margin-top:15px;
background:linear-gradient(90deg,#7c6cff,#00f2ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:move 2s infinite alternate;
}

@keyframes move{
from{letter-spacing:1px;}
to{letter-spacing:4px;}
}

.desc{
color:var(--muted);
margin-top:10px;
font-size:14px;
}

/* ===== MENU ICON ===== */
.menu-icon{
position:fixed;
top:20px;
right:15px;
background:var(--card);
width:50px;
height:50px;
display:flex;
align-items:center;
justify-content:center;
border-radius:12px;
cursor:pointer;
border:1px solid #1f2a44;
}

.menu{
position:fixed;
top:80px;
right:15px;
background:var(--card);
padding:10px;
border-radius:12px;
display:none;
flex-direction:column;
gap:10px;
border:1px solid #1f2a44;
}

.menu button{
background:transparent;
border:none;
color:#fff;
padding:8px;
text-align:right;
cursor:pointer;
}

.menu button:hover{
background:var(--primary);
border-radius:8px;
}

/* ===== CONTENT ===== */
.box{
margin:20px;
background:var(--card);
padding:15px;
border-radius:15px;
border:1px solid #1f2a44;
}

/* ===== GRID ===== */
.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.item{
background:var(--card);
padding:15px;
border-radius:12px;
border:1px solid #1f2a44;
cursor:pointer;
text-align:center;
}

.item:hover{
background:rgba(124,108,255,0.2);
}

/* FLOAT TELEGRAM */
.tg{
position:fixed;
bottom:20px;
left:20px;
width:55px;
height:55px;
background:#7c6cff;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
box-shadow:0 0 20px #7c6cff;
}

</style>
</head>

<body>

<div class="bg-blur"></div>

<!-- MENU -->
<div class="menu-icon" onclick="toggleMenu()">
<i class="fa fa-gear"></i>
</div>

<div class="menu" id="menu">
<button onclick="show('countries')">🌍 الدول</button>
<button onclick="show('numbers')">📱 الأرقام</button>
<button onclick="show('orders')">🧾 الطلبات</button>
<button onclick="show('stats')">📊 الإحصائيات</button>
<button onclick="show('payment')">💳 الدفع</button>
</div>

<!-- HERO -->
<div class="hero">

<img class="avatar" src="https://i.postimg.cc/vZps3xpJ/file-000000002878720ab1fd8c8b5f702d6c.png">

<div class="title">newnumbervip</div>
<div class="desc">
أهلاً بك في أقوى منصة للأرقام الافتراضية
</div>
</div>

<!-- CONTENT -->
<div class="box" id="content">
<h3>اختر من القائمة ⚙️</h3>
</div>

<!-- TELEGRAM -->
<div class="tg" onclick="window.open('https://t.me/YOUR_USERNAME')">
<i class="fa-brands fa-telegram"></i>
</div>

<script>

function toggleMenu(){
let m=document.getElementById("menu");
m.style.display = (m.style.display==="flex")?"none":"flex";
}

function show(type){

let c=document.getElementById("content");

if(type==="countries"){
c.innerHTML=`
<h3>الدول المتاحة</h3>
<div class="grid">
<div class="item" onclick="openCountry('مصر')">🇪🇬 مصر</div>
<div class="item">🇸🇦 السعودية</div>
<div class="item">🇺🇸 أمريكا</div>
<div class="item">🇦🇪 الإمارات</div>
<div class="item">🇬🇧 بريطانيا</div>
</div>
`;
}

if(type==="numbers"){
c.innerHTML=`
<h3>الأرقام</h3>
<p>اختار دولة الأول</p>
`;
}

if(type==="orders"){
c.innerHTML="<h3>الطلبات</h3><p>لا يوجد طلبات</p>";
}

if(type==="stats"){
c.innerHTML="<h3>الإحصائيات</h3><p>زيارات: 11,000 - أرباح: $4000</p>";
}

if(type==="payment"){
c.innerHTML="<h3>طرق الدفع</h3><p>Vodafone Cash - InstaPay</p>";
}

}

function openCountry(name){
document.getElementById("content").innerHTML=`
<h3>${name}</h3>
<div class="grid">
<div class="item">رقم + سعر 10$</div>
<div class="item">رقم + سعر 12$</div>
</div>
`;
}

</script>

</body>
</html>
